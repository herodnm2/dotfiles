exec-once=swaybg -i /home/clevex/111.jpg
exec-once=pipewire
exec-once=pipewire-pulse
exec-once=wireplumber
exec=awww-daemon
# Window effect
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes = 1
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
shadow_only_floating = 2
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x11111ff

border_radius=0
no_radius_when_single=0
focused_opacity=1
unfocused_opacity=1.0

# Gaps
smartgaps=0
gappih=5
gappiv=5
gappoh=10
gappov=10

animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=zoom
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1

zoom_initial_ratio=0.15
zoom_end_ratio=1.0

fadein_begin_opacity=0.0
fadeout_begin_opacity=1.0

animation_duration_move=350
animation_duration_open=420
animation_duration_tag=300
animation_duration_close=600
animation_duration_focus=120

animation_curve_open=0.22,1,0.36,1
animation_curve_move=0.22,1,0.36,1
animation_curve_tag=0.25,0.8,0.25,1
animation_curve_close=0.4,0.0,0.2,1
animation_curve_focus=0.3,1,0.5,1

animation_curve_opafadeout=0.4,0.0,0.6,1
animation_curve_opafadein=0.22,1,0.36,1

# Scroller
scroller_structs = 20
scroller_default_proportion = 0.90
scroller_default_proportion_single = 1.00
scroller_ignore_proportion_single = 1
scroller_focus_center = 0
scroller_prefer_center = 0
scroller_prefer_overspread = 1

# Master-Stack Layout Setting
default_nmaster = 1
default_mfact = 0.55
new_is_master = 1

# Center Tile
center_master_overspread = 0
center_when_single_stack = 1

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=50
repeat_delay=600
numlockon=0
xkb_rules_options=grp:alt_shift_toggle
xkb_rules_layout=us,ru,ua

# mouse
accel_profile=1

# Appearance
gappih=5
gappiv=5
gappoh=11
gappov=11
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0x444444ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
layerrule=animation_type_open:slide,layer_name:swaync
layerrule=animation_type_close:slide,layer_name:swaync
layerrule=layer_name:msnap,noanim:1,noblur:1
layerrule=layer_name:wofi,noblur:1
windowrule=isfloating:1,title:NBFC CLIENT


# sub config load
source=./monitor.conf
source=./keybinds.conf
source=./env.conf

#tearing
allow_tearing=1

#syncobj
syncobj_enable=1

# run autostart
exec-once=~/.config/mango/autostart.sh

