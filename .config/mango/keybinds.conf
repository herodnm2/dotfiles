# Key Bindings (cleaned to match sway)

# reload config
bind=SUPER,r,reload_config

# menu and terminal
bind=SUPER,space,spawn,~/.config/rofi/launchers/type-2/launcher.sh
bind=SUPER,Return,spawn,alacritty

#screenshot 

bind=SUPER,Print,spawn_shell,/home/clevex/.local/bin/msnap shot --region
bind=ALT,Print,spawn_shell,msnap cast --toggle --region

# kill window
bind=SUPER,q,killclient,

# browser
bind=SUPER,B,spawn,env __NV_PRIME_RENDER_OFFLOAD=1 __GLX_VENDOR_LIBRARY_NAME=nvidia LIBVA_DRIVER_NAME=nvidia MOZ_DISABLE_RDD_SANDBOX=1 firefox
# explorer
bind=SUPER,E,spawn,thunar

# wallpaper switcher
bind=SUPER,P,spawn,./wallpaper.sh

# focus (arrow keys)
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

# move windows (swap)
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# fullscreen
bind=SUPER,f,togglefullscreen,

# floating toggle
bind=SUPER,t,togglefloating,

# workspaces (switch)
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER,n,switch_layout

# move window to workspace
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

bind=NONE,XF86AudioRaiseVolume,spawn_shell,swaync-client -cp && pamixer -i 5 && notify-send "Volume" "$(pamixer --get-volume)%" -h int:value:$(pamixer --get-volume) -t 500
bind=NONE,XF86AudioLowerVolume,spawn_shell,swaync-client -cp && pamixer -d 5 && notify-send "Volume" "$(pamixer --get-volume)%" -h int:value:$(pamixer --get-volume) -t 500
bind=NONE,XF86AudioMute,spawn_shell,swaync-client -cp && pamixer -t && notify-send "Mute" "$(pamixer --get-mute)" -t 500

bind=NONE,XF86MonBrightnessUp,spawn_shell,swaync-client -cp && brightnessctl set +5% && notify-send "Brightness" "$(brightnessctl | grep -oP '\(\K[0-9]+(?=%\))')%" -h int:value:$(brightnessctl | grep -oP '\(\K[0-9]+(?=%\))') -t 500

bind=NONE,XF86MonBrightnessDown,spawn_shell,swaync-client -cp && brightnessctl set 5%- && notify-send "Brightness" "$(brightnessctl | grep -oP '\(\K[0-9]+(?=%\))')%" -h int:value:$(brightnessctl | grep -oP '\(\K[0-9]+(?=%\))') -t 500
# mouse resize 
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
