
[cursor.style]
blinking = "On"
shape = "Beam"

[font]
size = 14

[font.normal]
family = "DejaVu Sans Mono"

[scrolling]
history = 100000

[colors.primary]
background = "#121212"
foreground = "#ffffff"

[window]
dynamic_padding = true
opacity = 1.0

[window.padding]
x = 12
y = 12

[env]
WINIT_UNIX_BACKEND = "wayland"

[general]
live_config_reload = true
